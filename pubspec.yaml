name: flutter_app_aethervault
description: "Aethervault - track MTG decks and collection."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.3
  firebase_core: ^4.7.0
  google_fonts: ^6.2.1
  http: ^1.1.0
  flutter_svg: ^2.0.17
  path: ^1.9.0
  path_provider: ^2.0.15
  shared_preferences: ^2.5.3
  firebase_auth: ^6.3.0
  archive: ^3.3.5
  multi_split_view: 3.6.1
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.40

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/l10n/
    # compact scryfall asset removed